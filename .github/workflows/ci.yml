name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Lint, types, tests, coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.11.8"
          enable-cache: true
      - name: Install Python and dependencies (frozen)
        run: uv sync --frozen
      - name: Ruff lint
        run: uv run ruff check .
      - name: Ruff format
        run: uv run ruff format --check .
      - name: Pyright (strict)
        run: uv run pyright
      - name: Tests + coverage (100% gate)
        run: uv run pytest --cov-report=xml
      - name: Smoke — import and OpenAPI schema
        run: |
          uv run python -c "from bicho.api.app import create_app; create_app()"
          uv run python -c "import json; from bicho.api.app import create_app; json.dumps(create_app().openapi())"
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  dependencies:
    name: Dependency audit (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.11.8"
      - name: Export locked dependencies
        run: uv export --frozen --no-dev --no-emit-project --format requirements-txt --output-file requirements.txt
      - name: Audit dependencies for known vulnerabilities
        run: uvx pip-audit --requirement requirements.txt

  docker:
    name: Docker build smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Build image
        run: docker build --tag bicho-pr-reviewer:ci .
