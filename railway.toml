# Single Railway service, single instance, no database, no volume — see docs/adr and README.
[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
# No startCommand: use the Dockerfile CMD (exec-form `sh -c "... --port ${PORT:-8000}"`), which
# expands Railway's injected $PORT. A startCommand string here is passed to uvicorn without shell
# expansion, so `$PORT` reaches it literally ("'$PORT' is not a valid integer").
healthcheckPath = "/healthz"
healthcheckTimeout = 100
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
numReplicas = 1
